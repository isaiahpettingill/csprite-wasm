<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>csprite</title>
	<style>
		html,
		body {
			margin: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			background: #000;
		}

		canvas {
			display: block;
			width: 100vw;
			height: 100vh;
			background: #000;
			outline: none;
		}
	</style>
</head>
<body>
	<canvas id="canvas" tabindex="-1" oncontextmenu="event.preventDefault()"></canvas>
	<script>
		const canvas = document.getElementById("canvas");

		var Module = {
			canvas,
			print: (text) => console.log(text),
			printErr: (text) => console.error(text),
			setStatus: (text) => {
				if (text) console.log(text);
			},
		};

		canvas.addEventListener("webglcontextlost", (event) => {
			event.preventDefault();
			console.error("WebGL context lost. Reload the page.");
		});
	</script>
	<script async src="csprite.js"></script>
</body>
</html>
